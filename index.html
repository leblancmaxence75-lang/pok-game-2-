<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>POKÉ-BATTLE 2 - COMBAT</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background-color: #121212; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        .btn { padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; margin: 5px; text-transform: uppercase; transition: 0.2s; }
        .gold { background: gold; color: black; } .red { background: #ee1515; color: white; } .green { background: #2ecc71; color: white; } .blue { background: #3498db; color: white; }
        
        /* Terrain de Combat */
        #battle-screen { width: 100%; max-width: 800px; margin: 0 auto; background: #222; border: 4px solid #444; border-radius: 15px; padding: 20px; position: relative; }
        .arena { display: flex; justify-content: space-between; align-items: flex-end; height: 300px; margin-bottom: 20px; background: linear-gradient(to bottom, #34495e, #2c3e50); border-radius: 10px; padding: 20px; }
        
        .poke-battle-box { width: 45%; text-align: center; }
        .hp-bar-bg { width: 100%; background: #444; height: 15px; border-radius: 10px; border: 2px solid #000; margin-top: 5px; }
        .hp-bar-fill { height: 100%; background: #2ecc71; width: 100%; border-radius: 8px; transition: width 0.5s; }
        .sprite-battle { width: 150px; image-rendering: pixelated; }

        /* Menu Actions */
        #battle-menu { background: #333; padding: 15px; border-radius: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .move-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* Journal de combat */
        #battle-log { background: #000; color: #0f0; padding: 10px; height: 80px; overflow-y: auto; font-family: monospace; text-align: left; margin-top: 10px; border-radius: 5px; font-size: 0.9em; }

        /* Style existant PC et Team */
        #team-bar { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; background: #1a1a1a; padding: 10px; border-radius: 10px; }
        .team-slot { width: 60px; height: 60px; background: rgba(255,255,255,0.05); border-radius: 5px; border: 1px dashed #444; position: relative; }
        .team-slot img { width: 100%; }
        #boite-pc { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; }
        .grid-pc { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 50px; }
        .slot-poke { background: #333; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="screen-multi">
        <h1>POKÉ-BATTLE 2</h1>
        <p id="status" style="color: gold;">En attente...</p>
        <div style="background: #1e1e1e; padding: 20px; border-radius: 15px; display: inline-block;">
            <button class="btn gold" onclick="creerPartie()">HOST</button>
            <p id="display-id" style="color: #2ecc71; font-family: monospace;"></p>
            <input type="text" id="input-code" placeholder="Code adversaire" style="padding: 10px; border-radius: 5px;">
            <button class="btn green" onclick="rejoindrePartie()">REJOINDRE</button>
        </div>
    </div>

    <div id="game-zone" class="hidden">
        <div id="team-bar">
            <div class="team-slot" id="slot-0"></div><div class="team-slot" id="slot-1"></div><div class="team-slot" id="slot-2"></div>
            <div class="team-slot" id="slot-3"></div><div class="team-slot" id="slot-4"></div><div class="team-slot" id="slot-5"></div>
            <button id="btn-prets" class="btn green hidden" onclick="envoyerEquipe()">COMBATTRE !</button>
        </div>
        <button class="btn gold" onclick="ouvrirBoitePC()">MONTRER LE PC</button>
    </div>

    <div id="battle-screen" class="hidden">
        <div class="arena">
            <div class="poke-battle-box">
                <strong id="my-name">---</strong>
                <div class="hp-bar-bg"><div id="my-hp-bar" class="hp-bar-fill"></div></div>
                <div id="my-hp-text">100/100</div>
                <img id="my-sprite" class="sprite-battle" src="">
            </div>
            <div class="poke-battle-box">
                <strong id="opp-name">---</strong>
                <div class="hp-bar-bg"><div id="opp-hp-bar" class="hp-bar-fill"></div></div>
                <div id="opp-hp-text">100/100</div>
                <img id="opp-sprite" class="sprite-battle" src="">
            </div>
        </div>

        <div id="battle-log">Bienvenue en combat ! En attente des ordres...</div>

        <div id="battle-menu">
            <button class="btn blue" onclick="afficherMoves()">ATTAQUE</button>
            <button class="btn green" onclick="afficherSwitch()">POKÉMON</button>
        </div>

        <div id="moves-menu" class="hidden move-grid"></div>
        <div id="switch-menu" class="hidden move-grid"></div>
    </div>

    <div id="boite-pc" class="hidden">
        <div class="grid-pc" id="liste-pokemon"></div>
        <button class="btn red" onclick="fermerBoitePC()">FERMER</button>
    </div>

    <script>
        // --- BASE DE DONNÉES (VERSION COMPACTE) ---
        const listePokemon = [
            { id: 392, name: "Simiabraz", type: "Feu/Combat", hp: 136, atk: 109, def: 76, atqSp: 109, defSp: 76, vit: 113, moves: [{n:"Lance-Flammes",p:90,t:"fire"},{n:"Close Combat",p:120,t:"fighting"},{n:"Noeud'Herbe",p:80,t:"grass"},{n:"Puis. Cachée",p:60,t:"normal"}] },
            { id: 887, name: "Lanssorien", type: "Dragon/Spectre", hp: 148, atk: 125, def: 80, atqSp: 105, defSp: 80, vit: 147, moves: [{n:"Demi-Tour",p:70,t:"bug"},{n:"Lance-Flammes",p:90,t:"fire"},{n:"Draco Météor",p:130,t:"dragon"},{n:"Ball'Ombre",p:80,t:"ghost"}] },
            { id: 184, name: "Azumarill", type: "Eau/Fée", hp: 160, atk: 55, def: 85, atqSp: 65, defSp: 85, vit: 55, moves: [{n:"Câlinerie",p:90,t:"fairy"},{n:"Aqua-Brèche",p:85,t:"water"},{n:"Cryo-Pirouette",p:80,t:"ice"},{n:"Cognobidon",p:0,t:"normal"}] },
            { id: 149, name: "Dracolosse", type: "Dragon/Vol", hp: 151, atk: 139, def: 100, atqSp: 105, defSp: 105, vit: 85, moves: [{n:"Vitesse Extrême",p:80,t:"normal"},{n:"Vent Violent",p:110,t:"flying"},{n:"Danse Draco",p:0,t:"dragon"},{n:"Draco-Griffe",p:80,t:"dragon"}] },
            { id: 383, name: "Groudon", type: "Sol", hp: 160, atk: 155, def: 145, atqSp: 105, defSp: 95, vit: 95, moves: [{n:"Lame Pangéenne",p:120,t:"ground"},{n:"Lame de Roc",p:100,t:"rock"},{n:"Cage Éclair",p:0,t:"electric"},{n:"Danse Lames",p:0,t:"normal"}] },
            { id: 1000, name: "Gromago", type: "Acier/Spectre", hp: 147, atk: 65, def: 100, atqSp: 138, defSp: 96, vit: 89, moves: [{n:"Ruée d'Or",p:120,t:"steel"},{n:"Ball'Ombre",p:80,t:"ghost"},{n:"Machination",p:0,t:"dark"},{n:"Tonnerre",p:90,t:"electric"}] }
            // (Ajoute les autres ici sur le même modèle si besoin)
        ];

        // --- VARIABLES DE COMBAT ---
        let monEquipe = [];
        let equipeAdv = [];
        let monIndexActive = 0;
        let advIndexActive = 0;
        let monChoix = null;
        let choixAdv = null;

        // --- RESEAU ---
        let peer = new Peer();
        let conn;

        peer.on('open', id => document.getElementById('status').innerText = "Mon ID: " + id);
        peer.on('connection', c => { conn = c; initReseau(); });

        function creerPartie() { document.getElementById('display-id').innerText = peer.id; }
        function rejoindrePartie() { 
            conn = peer.connect(document.getElementById('input-code').value); 
            initReseau(); 
        }

        function initReseau() {
            document.getElementById('screen-multi').classList.add('hidden');
            document.getElementById('game-zone').classList.remove('hidden');
            conn.on('data', data => {
                if(data.type === "team") { equipeAdv = data.team; verifierLancement(); }
                if(data.type === "action") { choixAdv = data.choix; verifierTour(); }
            });
        }

        // --- SELECTION ---
        function ouvrirBoitePC() {
            document.getElementById('boite-pc').classList.remove('hidden');
            const liste = document.getElementById('liste-pokemon');
            liste.innerHTML = "";
            listePokemon.forEach((p, i) => {
                liste.innerHTML += `<div class="slot-poke" onclick="ajouterEquipe(${i})"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png"></div>`;
            });
        }

        function ajouterEquipe(i) {
            if(monEquipe.length < 6) {
                let p = JSON.parse(JSON.stringify(listePokemon[i])); // Clone
                p.currentHp = p.hp * 3; // On multiplie les PV pour que le combat dure
                p.maxHp = p.hp * 3;
                monEquipe.push(p);
                MAJEquipeGraphique();
            }
        }

        function MAJEquipeGraphique() {
            monEquipe.forEach((p, i) => {
                document.getElementById('slot-'+i).innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png">`;
            });
            if(monEquipe.length === 6) document.getElementById('btn-prets').classList.remove('hidden');
        }

        function envoyerEquipe() {
            conn.send({type: "team", team: monEquipe});
            document.getElementById('game-zone').innerHTML = "<h2>Équipe envoyée ! En attente de l'adversaire...</h2>";
            verifierLancement();
        }

        function verifierLancement() {
            if(monEquipe.length === 6 && equipeAdv.length === 6) {
                document.getElementById('game-zone').classList.add('hidden');
                document.getElementById('battle-screen').classList.remove('hidden');
                MAJInterfaceCombat();
            }
        }

        // --- LOGIQUE DE COMBAT ---
        function MAJInterfaceCombat() {
            const m = monEquipe[monIndexActive];
            const o = equipeAdv[advIndexActive];

            document.getElementById('my-name').innerText = m.name;
            document.getElementById('my-sprite').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/${m.id}.png`;
            document.getElementById('my-hp-text').innerText = `${Math.ceil(m.currentHp)} / ${m.maxHp}`;
            document.getElementById('my-hp-bar').style.width = (m.currentHp / m.maxHp * 100) + "%";

            document.getElementById('opp-name').innerText = o.name;
            document.getElementById('opp-sprite').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${o.id}.png`;
            document.getElementById('opp-hp-text').innerText = `${Math.ceil(o.currentHp)} / ${o.maxHp}`;
            document.getElementById('opp-hp-bar').style.width = (o.currentHp / o.maxHp * 100) + "%";
            
            document.getElementById('battle-menu').classList.remove('hidden');
            document.getElementById('moves-menu').classList.add('hidden');
            document.getElementById('switch-menu').classList.add('hidden');
        }

        function afficherMoves() {
            const menu = document.getElementById('moves-menu');
            menu.innerHTML = "";
            monEquipe[monIndexActive].moves.forEach((m, i) => {
                menu.innerHTML += `<button class="btn gold" onclick="choisirAction('attack', ${i})">${m.n}</button>`;
            });
            document.getElementById('battle-menu').classList.add('hidden');
            menu.classList.remove('hidden');
        }

        function choisirAction(type, index) {
            monChoix = { type, index };
            conn.send({ type: "action", choix: monChoix });
            document.getElementById('battle-log').innerText = "En attente de l'adversaire...";
            document.getElementById('moves-menu').classList.add('hidden');
            verifierTour();
        }

        function verifierTour() {
            if (monChoix && choixAdv) {
                resoudreTour();
            }
        }

        function resoudreTour() {
            let log = document.getElementById('battle-log');
            const m = monEquipe[monIndexActive];
            const o = equipeAdv[advIndexActive];

            // Ordre : Vitesse (simplifié)
            let premier = (m.vit >= o.vit) ? "joueur" : "adv";
            
            if(premier === "joueur") {
                appliquerDegats(m, o, monChoix, "adversaire");
                if(o.currentHp > 0) appliquerDegats(o, m, choixAdv, "joueur");
            } else {
                appliquerDegats(o, m, choixAdv, "joueur");
                if(m.currentHp > 0) appliquerDegats(m, o, monChoix, "adversaire");
            }

            monChoix = null;
            choixAdv = null;
            MAJInterfaceCombat();
            
            if(m.currentHp <= 0) log.innerText = m.name + " est KO !";
            if(o.currentHp <= 0) log.innerText = "L'adversaire est KO !";
        }

        function appliquerDegats(attaquant, cible, action, cibleNom) {
            if(action.type === "attack") {
                const move = attaquant.moves[action.index];
                if(move.p > 0) {
                    let degats = (attaquant.atk / cible.def) * move.p * 0.5;
                    cible.currentHp -= degats;
                    document.getElementById('battle-log').innerText = attaquant.name + " utilise " + move.n + " !";
                } else {
                    document.getElementById('battle-log').innerText = attaquant.name + " utilise une capacité de statut !";
                }
            }
            if(cible.currentHp < 0) cible.currentHp = 0;
        }

        function fermerBoitePC() { document.getElementById('boite-pc').classList.add('hidden'); }
    </script>
</body>
</html>
