<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>POKÉ-BATTLE 2</title>
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            text-align: center; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 50px; 
        }
        
        h1 { color: #ee1515; font-size: 3em; }

        .bouton-jouer { 
            background-color: gold; 
            color: black; 
            padding: 20px 50px; 
            border-radius: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            font-size: 1.5em; 
            margin-bottom: 20px;
            transition: 0.3s;
        }
        
        .bouton-jouer:hover { transform: scale(1.1); }

        .bouton-ancien { 
            background-color: #333; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            text-decoration: none; 
            display: inline-block; 
            border: 1px solid #555;
        }

        footer { 
            color: #555; 
            margin-top: 100px; 
            font-size: 0.8em; 
        }
    </style>
</head>

<body>

    <h1>POKÉ-BATTLE 2</h1>

    <div>
        <button class="bouton-jouer">JOUER</button>
    </div>

    <div>
        <a href="https://poke-multi.vercel.app" class="bouton-ancien">RETOUR POKÉ-BATTLE 1</a>
    </div>

    <footer>
        Réalisé par Vegechou, By Vegechou
    </footer>

</body>
</html>
