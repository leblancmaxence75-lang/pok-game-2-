<html>
<head>
    <style>
        body {
            background-color: #121212;
            color: white;
            text-align: center;
            font-family: sans-serif;
        }

        h1 { color: #ee1515; }

        .profil-box {
            background: #222;
            border: 1px solid #ee1515;
            padding: 15px;
            width: 300px;
            margin: 20px auto;
            border-radius: 8px;
        }

        input {
            padding: 8px;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
            outline: none;
        }

        .bouton-jouer {
            background-color: gold;
            color: black;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 1.2em;
            margin-top: 10px;
        }

        .bouton-menu {
            background-color: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
            border: 1px solid #555;
            text-decoration: none;
            display: inline-block;
        }

        footer {
            color: #555;
            margin-top: 50px;
            font-size: 0.8em;
        }
    </style>
</head>

<body>
    
    <h1>POKÉ-BATTLE 2</h1>

    <div class="profil-box">
        <div id="affichage-pseudo">
            <p>Bienvenue, <strong id="pseudo-nom">Dresseur</strong> !</p>
            <button onclick="changerPseudo()" style="font-size: 0.7em; cursor: pointer;">Changer de pseudo</button>
        </div>
        
        <div id="formulaire-pseudo" style="display: none;">
            <input type="text" id="input-pseudo" placeholder="Entre ton pseudo...">
            <br>
            <button class="bouton-menu" onclick="sauvegarderPseudo()">Valider</button>
        </div>
    </div>

    <div>
        <button class="bouton-jouer">JOUER</button>
    </div>

    <div>
        <button class="bouton-menu">PARAMÈTRES</button>
        <button class="bouton-menu">BOUTIQUE</button>
        <button class="bouton-menu">MULTIJOUEUR</button>
        <a href="https://poke-multi.vercel.app" class="bouton-menu">RETOUR POKÉ-BATTLE 1</a>
    </div>

    <footer>
        Réalisé par Vegechou, By Vegechou
    </footer>

    <script>
        const zoneAffichage = document.getElementById('affichage-pseudo');
        const zoneFormulaire = document.getElementById('formulaire-pseudo');
        const textePseudo = document.getElementById('pseudo-nom');
        const inputPseudo = document.getElementById('input-pseudo');

        // Vérification du pseudo au démarrage
        let pseudoSauvegarde = localStorage.getItem('pseudoPoke');

        if (pseudoSauvegarde) {
            textePseudo.innerText = pseudoSauvegarde;
            zoneAffichage.style.display = "block";
            zoneFormulaire.style.display = "none";
        } else {
            zoneAffichage.style.display = "none";
            zoneFormulaire.style.display = "block";
        }

        function sauvegarderPseudo() {
            let nouveauPseudo = inputPseudo.value;
            if (nouveauPseudo.trim().length > 0) {
                localStorage.setItem('pseudoPoke', nouveauPseudo);
                textePseudo.innerText = nouveauPseudo;
                zoneAffichage.style.display = "block";
                zoneFormulaire.style.display = "none";
            }
        }

        function changerPseudo() {
            zoneAffichage.style.display = "none";
            zoneFormulaire.style.display = "block";
        }

        // Commande pour forcer la suppression de l'ancien argent des tests précédents
        localStorage.removeItem('argentVegechou');
    </script>

</body>
</html>
