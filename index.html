<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>POKÉ-BATTLE 2 - BETA FINALE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background-color: #121212; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        .btn { padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; margin: 5px; text-transform: uppercase; }
        .gold { background: gold; color: black; } .red { background: #ee1515; color: white; } .green { background: #2ecc71; color: white; } .blue { background: #3498db; color: white; }
        
        #battle-screen { width: 100%; max-width: 800px; margin: 0 auto; background: #222; border: 4px solid #444; border-radius: 15px; padding: 20px; }
        .arena { display: flex; justify-content: space-between; align-items: flex-end; height: 240px; background: linear-gradient(to bottom, #34495e, #2c3e50); border-radius: 10px; padding: 20px; margin-bottom: 10px; }
        
        .poke-battle-box { width: 45%; }
        .hp-bar-bg { width: 100%; background: #444; height: 12px; border-radius: 10px; border: 2px solid #000; overflow: hidden; margin: 5px 0; }
        .hp-bar-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.5s; }
        .sprite-battle { width: 120px; image-rendering: pixelated; }

        #battle-menu, .move-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        #battle-log { background: #000; color: #0f0; padding: 10px; height: 50px; overflow-y: auto; font-family: monospace; border-radius: 5px; font-size: 0.85em; margin-bottom: 10px; border: 1px solid #333; }

        #team-bar { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; background: #1a1a1a; padding: 10px; border-radius: 10px; }
        .team-slot { width: 60px; height: 60px; background: rgba(255,255,255,0.05); border-radius: 5px; border: 1px dashed #444; }
        .team-slot img { width: 100%; }
        
        #boite-pc { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; }
        .grid-pc { display: grid; grid-template-columns: repeat(6, 2fr); gap: 10px; padding: 40px; }
        .slot-poke { background: #333; border-radius: 10px; cursor: pointer; padding: 10px; border: 2px solid transparent; }
        .slot-poke:hover { border-color: gold; }
        .slot-poke img { width: 80px; }
        
        .ko { filter: grayscale(1) brightness(0.5); pointer-events: none; }
    </style>
</head>
<body>

    <div id="screen-multi">
        <h1>POKÉ-BATTLE 2</h1>
        <p id="status" style="color: gold;">Initialisation...</p>
        <button class="btn gold" onclick="creerPartie()">HOST</button>
        <p id="display-id" style="color: #2ecc71; font-family: monospace;"></p>
        <input type="text" id="input-code" placeholder="Code Code Code" style="padding: 10px; border-radius: 5px;">
        <button class="btn green" onclick="rejoindrePartie()">REJOINDRE</button>
    </div>

    <div id="game-zone" class="hidden">
        <div id="team-bar">
            <div class="team-slot" id="slot-0"></div><div class="team-slot" id="slot-1"></div><div class="team-slot" id="slot-2"></div>
            <div class="team-slot" id="slot-3"></div><div class="team-slot" id="slot-4"></div><div class="team-slot" id="slot-5"></div>
            <button id="btn-prets" class="btn green hidden" onclick="envoyerEquipe()">COMBATTRE !</button>
        </div>
        <button class="btn gold" onclick="ouvrirBoitePC()">CHOISIR MES POKÉMON</button>
    </div>

    <div id="battle-screen" class="hidden">
        <div class="arena">
            <div class="poke-battle-box">
                <strong id="my-name">---</strong>
                <div class="hp-bar-bg"><div id="my-hp-bar" class="hp-bar-fill"></div></div>
                <img id="my-sprite" class="sprite-battle" src="">
            </div>
            <div class="poke-battle-box">
                <strong id="opp-name">---</strong>
                <div class="hp-bar-bg"><div id="opp-hp-bar" class="hp-bar-fill"></div></div>
                <img id="opp-sprite" class="sprite-battle" src="">
            </div>
        </div>

        <div id="battle-log">Début du match !</div>

        <div id="battle-menu">
            <button id="btn-atk-menu" class="btn blue" onclick="ouvrirMenuAttaque()">ATTAQUE</button>
            <button id="btn-switch-menu" class="btn green" onclick="ouvrirMenuSwitch(false)">POKÉMON</button>
        </div>

        <div id="moves-menu" class="hidden move-grid"></div>
        <div id="switch-menu" class="hidden move-grid"></div>
    </div>

    <div id="boite-pc" class="hidden">
        <div class="grid-pc" id="liste-pokemon"></div>
        <button id="btn-fermer-pc" class="btn red" onclick="fermerBoitePC()">FERMER</button>
    </div>

    <script>
        const dataPokes = [
            { id: 392, name: "Simiabraz", hp: 136, atk: 109, def: 76, vit: 113, moves: [{n:"Lance-Flammes",p:90},{n:"Close Combat",p:120},{n:"Noeud'Herbe",p:80},{n:"Puis. Cachée",p:60}] },
            { id: 887, name: "Lanssorien", hp: 148, atk: 125, def: 80, vit: 147, moves: [{n:"Demi-Tour",p:70},{n:"Lance-Flammes",p:90},{n:"Draco Météor",p:130},{n:"Ball'Ombre",p:80}] },
            { id: 184, name: "Azumarill", hp: 160, atk: 110, def: 85, vit: 55, moves: [{n:"Câlinerie",p:90},{n:"Aqua-Brèche",p:85},{n:"Cryo-Pirouette",p:80},{n:"Cascade",p:80}] },
            { id: 149, name: "Dracolosse", hp: 151, atk: 139, def: 100, vit: 85, moves: [{n:"Vitesse Extrême",p:80},{n:"Vent Violent",p:110},{n:"Danse Draco",p:0},{n:"Draco-Griffe",p:80}] },
            { id: 383, name: "Groudon", hp: 160, atk: 155, def: 145, vit: 95, moves: [{n:"Lame Pangéenne",p:120},{n:"Lame de Roc",p:100},{n:"Poing de Feu",p:75},{n:"Séisme",p:100}] },
            { id: 1000, name: "Gromago", hp: 147, atk: 65, def: 100, vit: 89, moves: [{n:"Ruée d'Or",p:120},{n:"Ball'Ombre",p:80},{n:"Tonnerre",p:90},{n:"Soin",p:0}] },
            { id: 260, name: "Laggron", hp: 160, atk: 115, def: 95, vit: 65, moves: [{n:"Séisme",p:100},{n:"Eau Revoir",p:70},{n:"Laser Glace",p:90},{n:"Cascade",p:80}] },
            { id: 724, name: "Archéduc", hp: 138, atk: 112, def: 80, vit: 75, moves: [{n:"Tisse Ombre",p:80},{n:"Rapace",p:120},{n:"Lame Feuille",p:90},{n:"Coup Bas",p:70}] },
            { id: 34, name: "Nidoking", hp: 141, atk: 107, def: 82, vit: 90, moves: [{n:"Telluriforce",p:90},{n:"Laser Glace",p:90},{n:"Cradovague",p:95},{n:"Lance-Flammes",p:90}] },
            { id: 778, name: "Mimiqui", hp: 115, atk: 95, def: 85, vit: 101, moves: [{n:"Câlinerie",p:90},{n:"Griffe Ombre",p:70},{n:"Ombre Portée",p:40},{n:"Danse Lames",p:0}] },
            { id: 10103, name: "Feunard d'Alola", hp: 133, atk: 72, def: 80, vit: 114, moves: [{n:"Pouvoir Lunaire",p:95},{n:"Lyophilisation",p:70},{n:"Vent Glacé",p:55},{n:"Voile Aurore",p:0}] },
            { id: 494, name: "Victini", hp: 160, atk: 105, def: 105, vit: 105, moves: [{n:"Coup Victoire",p:180},{n:"Psyko",p:90},{n:"Balle Énergie",p:90},{n:"Demi-Tour",p:70}] }
        ];

        let peer = new Peer();
        let conn;
        let monEquipe = [];
        let equipeAdv = [];
        let indexMoi = 0;
        let indexAdv = 0;
        let monChoix = null;
        let choixAdv = null;
        let forceSwitch = false;

        peer.on('open', id => document.getElementById('status').innerText = "Mon Code : " + id);
        peer.on('connection', c => { conn = c; setupNet(); });
        function creerPartie() { document.getElementById('display-id').innerText = peer.id; }
        function rejoindrePartie() { conn = peer.connect(document.getElementById('input-code').value); setupNet(); }

        function setupNet() {
            document.getElementById('screen-multi').classList.add('hidden');
            document.getElementById('game-zone').classList.remove('hidden');
            conn.on('data', data => {
                if(data.type === "team") { equipeAdv = data.team; checkStart(); }
                if(data.type === "action") { choixAdv = data.choix; checkTurn(); }
            });
        }

        function ouvrirBoitePC() {
            const list = document.getElementById('liste-pokemon');
            list.innerHTML = "";
            dataPokes.forEach((p, i) => {
                list.innerHTML += `<div class="slot-poke" onclick="pick(${i})"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png"><br>${p.name}</div>`;
            });
            document.getElementById('boite-pc').classList.remove('hidden');
        }

        function pick(i) {
            if(monEquipe.length < 6) {
                let p = JSON.parse(JSON.stringify(dataPokes[i]));
                p.hpMax = p.hp * 4; p.hpCur = p.hpMax;
                monEquipe.push(p);
                monEquipe.forEach((pk, idx) => document.getElementById('slot-'+idx).innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pk.id}.png">`);
                if(monEquipe.length === 6) document.getElementById('btn-prets').classList.remove('hidden');
            }
        }

        function envoyerEquipe() {
            conn.send({type: "team", team: monEquipe});
            document.getElementById('game-zone').innerHTML = "<h2>Équipe envoyée ! Attente...</h2>";
            checkStart();
        }

        function checkStart() {
            if(monEquipe.length === 6 && equipeAdv.length === 6) {
                document.getElementById('game-zone').classList.add('hidden');
                document.getElementById('battle-screen').classList.remove('hidden');
                updateBattleUI();
            }
        }

        function updateBattleUI() {
            const m = monEquipe[indexMoi]; const o = equipeAdv[indexAdv];
            document.getElementById('my-name').innerText = m.name;
            document.getElementById('my-sprite').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/${m.id}.png`;
            document.getElementById('my-hp-bar').style.width = (m.hpCur/m.hpMax*100) + "%";
            document.getElementById('opp-name').innerText = o.name;
            document.getElementById('opp-sprite').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${o.id}.png`;
            document.getElementById('opp-hp-bar').style.width = (o.hpCur/o.hpMax*100) + "%";
            
            document.getElementById('battle-menu').classList.toggle('hidden', forceSwitch);
            document.getElementById('moves-menu').classList.add('hidden');
            document.getElementById('switch-menu').classList.add('hidden');

            if(m.hpCur <= 0) {
                forceSwitch = true;
                document.getElementById('battle-log').innerText = m.name + " est KO ! Changez !";
                ouvrirMenuSwitch(true);
            }
        }

        function ouvrirMenuAttaque() {
            const m = document.getElementById('moves-menu'); m.innerHTML = "";
            monEquipe[indexMoi].moves.forEach((atk, i) => {
                m.innerHTML += `<button class="btn gold" onclick="sendAct('atk', ${i})">${atk.n}</button>`;
            });
            document.getElementById('battle-menu').classList.add('hidden'); m.classList.remove('hidden');
        }

        function ouvrirMenuSwitch(forced) {
            forceSwitch = forced;
            const s = document.getElementById('switch-menu'); s.innerHTML = "";
            monEquipe.forEach((p, i) => {
                let status = (p.hpCur <= 0) ? "ko" : "";
                if(i !== indexMoi) s.innerHTML += `<button class="btn green ${status}" onclick="sendAct('switch', ${i})">${p.name}</button>`;
            });
            document.getElementById('battle-menu').classList.add('hidden'); s.classList.remove('hidden');
        }

        function sendAct(type, i) {
            monChoix = {type, i};
            if(forceSwitch) {
                indexMoi = i;
                forceSwitch = false;
                document.getElementById('battle-log').innerText = "Vous envoyez " + monEquipe[i].name;
                updateBattleUI();
                return;
            }
            conn.send({type: "action", choix: monChoix});
            document.getElementById('battle-log').innerText = "Attente...";
            document.getElementById('moves-menu').classList.add('hidden');
            document.getElementById('switch-menu').classList.add('hidden');
            checkTurn();
        }

        function checkTurn() {
            if(monChoix && choixAdv) {
                let m = monEquipe[indexMoi]; let o = equipeAdv[indexAdv];
                
                // Switch direct
                if(monChoix.type === "switch") { indexMoi = monChoix.i; m = monEquipe[indexMoi]; }
                if(choixAdv.type === "switch") { indexAdv = choixAdv.i; o = equipeAdv[indexAdv]; }

                // Attaques par vitesse
                if(m.vit >= o.vit) {
                    if(monChoix.type === "atk") strike(m, o, monChoix.i);
                    if(o.hpCur > 0 && choixAdv.type === "atk") strike(o, m, choixAdv.i);
                } else {
                    if(choixAdv.type === "atk") strike(o, m, choixAdv.i);
                    if(m.hpCur > 0 && monChoix.type === "atk") strike(m, o, monChoix.i);
                }
                monChoix = null; choixAdv = null;
                updateBattleUI();
            }
        }

        function strike(atq, def, idx) {
            const move = atq.moves[idx];
            if(move.p > 0) {
                def.hpCur -= (atq.atk / def.def) * move.p * 0.8;
                if(def.hpCur < 0) def.hpCur = 0;
            }
            document.getElementById('battle-log').innerText = atq.name + " lance " + move.n;
        }

        function fermerBoitePC() { document.getElementById('boite-pc').classList.add('hidden'); }
    </script>
</body>
</html>
