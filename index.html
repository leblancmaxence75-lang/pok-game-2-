<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #121212; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        h1 { color: #ee1515; }
        .hidden { display: none !important; }

        /* Profil & Menu */
        .profil-box { background: #222; border: 1px solid #ee1515; padding: 15px; width: 300px; margin: 20px auto; border-radius: 8px; }
        .bouton-jouer { background-color: gold; color: black; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; font-size: 1.2em; margin-top: 10px; }
        .bouton-menu { background-color: #333; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin: 5px; border: 1px solid #555; text-decoration: none; display: inline-block; }

        /* Écran de Sélection Starter */
        .starter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding: 20px; max-height: 400px; overflow-y: auto; background: #1a1a1a; border-radius: 15px; border: 2px solid gold; margin-top: 20px; }
        .starter-card { background: #333; padding: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .starter-card:hover { border-color: gold; background: #444; }
        .starter-card img { width: 80px; }

        /* Interface PC (Boîte) */
        .pc-container { background: #2c3e50; border: 10px solid #34495e; border-radius: 20px; width: 90%; max-width: 800px; margin: 20px auto; display: flex; flex-wrap: wrap; padding: 20px; box-shadow: inset 0 0 50px rgba(0,0,0,0.5); }
        .pc-grid { flex: 1; min-width: 250px; background: #ecf0f1; border-radius: 10px; display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); gap: 5px; padding: 10px; min-height: 200px; }
        .pc-slot { background: rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.1); border-radius: 5px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .pc-slot img { width: 40px; }
        
        /* Détails Pokémon */
        .details-box { flex: 1; min-width: 250px; padding: 20px; text-align: left; background: #222; border-radius: 10px; margin-left: 20px; border: 2px solid #ee1515; }
        .type-badge { padding: 5px 10px; border-radius: 5px; font-size: 0.8em; font-weight: bold; text-transform: uppercase; margin-right: 5px; }
        
        footer { color: #555; margin-top: 50px; font-size: 0.8em; }
    </style>
</head>

<body>
    
    <div id="ecran-menu">
        <h1>POKÉ-BATTLE 2</h1>
        <div class="profil-box">
            <div id="affichage-pseudo">
                <p>Bienvenue, <strong id="pseudo-nom">Dresseur</strong> !</p>
                <button onclick="changerPseudo()" style="font-size: 0.7em; cursor: pointer;">Changer de pseudo</button>
            </div>
            <div id="formulaire-pseudo" style="display: none;">
                <input type="text" id="input-pseudo" placeholder="Entre ton pseudo...">
                <button class="bouton-menu" onclick="sauvegarderPseudo()">Valider</button>
            </div>
        </div>
        <div><button class="bouton-jouer" onclick="gererJouer()">JOUER</button></div>
        <div>
            <button class="bouton-menu">PARAMÈTRES</button>
            <button class="bouton-menu">BOUTIQUE</button>
            <button class="bouton-menu">MULTIJOUEUR</button>
            <a href="https://poke-multi.vercel.app" class="bouton-menu">RETOUR POKÉ-BATTLE 1</a>
        </div>
    </div>

    <div id="ecran-starter" class="hidden">
        <h2>CHOISIS TON PREMIER COMPAGNON</h2>
        <p>Générations 1 à 9</p>
        <div id="starter-list" class="starter-grid"></div>
        <button class="bouton-menu" onclick="retourMenu()">RETOUR</button>
    </div>

    <div id="ecran-pc" class="hidden">
        <h2>MON PC POKÉMON</h2>
        <div class="pc-container">
            <div id="pc-box" class="pc-grid"></div>
            <div id="poke-details" class="details-box">
                <p style="text-align:center; color:#777;">Sélectionne un Pokémon pour voir ses détails</p>
            </div>
        </div>
        <button class="bouton-menu" onclick="retourMenu()">RETOUR</button>
    </div>

    <footer>Réalisé par Vegechou, By Vegechou</footer>

    <script>
        // --- DONNÉES & PSEUDO ---
        const idsStarters = [1,4,7, 152,155,158, 252,255,258, 387,390,393, 495,498,501, 650,653,656, 722,725,728, 810,813,816, 906,909,912];
        let monEquipe = JSON.parse(localStorage.getItem('monEquipe')) || [];

        const textePseudo = document.getElementById('pseudo-nom');
        let pseudoSauvegarde = localStorage.getItem('pseudoPoke');
        if (pseudoSauvegarde) { textePseudo.innerText = pseudoSauvegarde; }

        // --- LOGIQUE DE NAVIGATION ---
        function gererJouer() {
            if (monEquipe.length === 0) {
                afficherChoixStarter();
            } else {
                afficherPC();
            }
        }

        function retourMenu() {
            document.getElementById('ecran-menu').classList.remove('hidden');
            document.getElementById('ecran-starter').classList.add('hidden');
            document.getElementById('ecran-pc').classList.add('hidden');
        }

        // --- CHOIX DU STARTER ---
        async function afficherChoixStarter() {
            document.getElementById('ecran-menu').classList.add('hidden');
            document.getElementById('ecran-starter').classList.remove('hidden');
            const grid = document.getElementById('starter-list');
            grid.innerHTML = "Chargement des starters...";

            let html = "";
            for (let id of idsStarters) {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                const p = await res.json();
                html += `
                    <div class="starter-card" onclick="choisirCePokemon(${p.id})">
                        <img src="${p.sprites.front_default}">
                        <p style="font-size:0.8em; margin:5px 0;">${p.name.toUpperCase()}</p>
                    </div>`;
            }
            grid.innerHTML = html;
        }

        async function choisirCePokemon(id) {
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
            const p = await res.json();
            const nouveauPoke = {
                id: p.id,
                name: p.name,
                img: p.sprites.other['official-artwork'].front_default,
                types: p.types.map(t => t.type.name),
                stats: {
                    hp: p.stats[0].base_stat,
                    atk: p.stats[1].base_stat,
                    def: p.stats[2].base_stat,
                    spe: p.stats[5].base_stat
                },
                moves: ["Charge", "Griffe"] // On commence simple
            };
            monEquipe.push(nouveauPoke);
            localStorage.setItem('monEquipe', JSON.stringify(monEquipe));
            afficherPC();
        }

        // --- INTERFACE PC ---
        function afficherPC() {
            document.getElementById('ecran-menu').classList.add('hidden');
            document.getElementById('ecran-starter').classList.add('hidden');
            document.getElementById('ecran-pc').classList.remove('hidden');

            const box = document.getElementById('pc-box');
            box.innerHTML = "";
            
            // Créer 30 slots
            for (let i = 0; i < 30; i++) {
                const slot = document.createElement('div');
                slot.className = 'pc-slot';
                if (monEquipe[i]) {
                    slot.innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${monEquipe[i].id}.png">`;
                    slot.onclick = () => voirDetails(monEquipe[i]);
                }
                box.appendChild(slot);
            }
        }

        function voirDetails(p) {
            const details = document.getElementById('poke-details');
            const typesHtml = p.types.map(t => `<span class="type-badge" style="background:${getColor(t)}">${t}</span>`).join('');
            
            details.innerHTML = `
                <h3 style="color:gold; margin-top:0;">${p.name.toUpperCase()}</h3>
                <img src="${p.img}" style="width:100%; max-width:150px; display:block; margin:auto;">
                <div style="margin:10px 0;">${typesHtml}</div>
                <hr border="1" color="#444">
                <p><b>HP:</b> ${p.stats.hp} | <b>VIT:</b> ${p.stats.spe}</p>
                <p><b>ATK:</b> ${p.stats.atk} | <b>DEF:</b> ${p.stats.def}</p>
                <p><b>ATTAQUES:</b> ${p.moves.join(', ')}</p>
                <p style="font-size:0.8em; color:#aaa; font-style:italic;">Un Pokémon rare obtenu comme Starter.</p>
            `;
        }

        function getColor(type) {
            const colors = { fire:'#ff4422', grass:'#77cc55', water:'#3399ff', normal:'#aaaa99', electric:'#ffcc33', flying:'#8899ff' };
            return colors[type] || '#777';
        }

        // --- FONCTIONS PSEUDO DE BASE ---
        function sauvegarderPseudo() {
            let p = document.getElementById('input-pseudo').value;
            if(p.trim()){ localStorage.setItem('pseudoPoke', p); textePseudo.innerText = p; changerPseudo(); }
        }
        function changerPseudo() {
            const form = document.getElementById('formulaire-pseudo');
            const aff = document.getElementById('affichage-pseudo');
            if(form.style.display === "none"){ form.style.display="block"; aff.style.display="none"; }
            else { form.style.display="none"; aff.style.display="block"; }
        }
    </script>
</body>
</html>
